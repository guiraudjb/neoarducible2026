<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arducible — Boss Deflect</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        :root { --void-bg: #030508; --c1: #00f0ff; --c2: #ff00ff; --c3: #fffb00; }
        body { background: var(--void-bg); font-family: 'Orbitron', sans-serif; overflow: hidden; margin: 0; }
        canvas { display: block; }
        #hud { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div id="hud">
        <div style="color: #ff0044; font-size: 1.5rem;">BOSS VÉCTORIEL</div>
        <div style="width: 200px; height: 10px; background: #333; margin: 10px auto; border: 1px solid #fff;">
            <div id="hp" style="width: 100%; height: 100%; background: #ff0044;"></div>
        </div>
    </div>
    <canvas id="gc"></canvas>

    <script>
        const canvas = document.getElementById('gc');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        const laneX = [canvas.width*0.25, canvas.width*0.5, canvas.width*0.75];
        let bossHP = 100, attacks = [], gameState = 'PLAYING';

        function spawnAttack() {
            if (gameState !== 'PLAYING') return;
            attacks.push({ lane: Math.floor(Math.random()*3), progress: 0 });
            setTimeout(spawnAttack, 1500 - (100 - bossHP) * 5); // Le boss accélère
        }

        function draw() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            // Dessin des 3 cibles (les zones de parade)
            laneX.forEach((x, i) => {
                ctx.strokeStyle = '#333'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(x, canvas.height - 100, 40, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.font = '20px Orbitron'; ctx.textAlign = 'center';
                ctx.fillText(['E', 'R', 'T'][i], x, canvas.height - 95);
            });

            // Dessin du Boss
            ctx.fillStyle = '#ff0044';
            ctx.fillRect(canvas.width/2 - 50, 50, 100, 50);

            // Dessin des attaques
            attacks.forEach((atk, i) => {
                atk.progress += 0.015;
                ctx.strokeStyle = '#ff0044'; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(canvas.width/2, 100);
                ctx.lineTo(laneX[atk.lane], 100 + atk.progress * (canvas.height - 200));
                ctx.stroke();

                if (atk.progress >= 1) { // Impact
                    bossHP = Math.max(0, bossHP - 10);
                    document.getElementById('hp').style.width = bossHP + '%';
                    attacks.splice(i, 1);
                }
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('keydown', e => {
            const lane = {'e':0, 'r':1, 't':2}[e.key.toLowerCase()];
            const atk = attacks.find(a => a.lane === lane && a.progress > 0.7);
            if (atk) { attacks.splice(attacks.indexOf(atk), 1); bossHP -= 5; } // Parade réussie
        });

        spawnAttack();
        draw();
    </script>
</body>
</html>

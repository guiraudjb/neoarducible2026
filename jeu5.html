<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arducible — Cyber Simon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        :root { --void-bg: #030508; --c1: #00f0ff; --c2: #ff00ff; --c3: #fffb00; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: var(--void-bg); font-family: 'Orbitron', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; color: white; }
        
        #game-board { display: flex; gap: 40px; margin-top: 50px; }
        .target { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #333; transition: all 0.1s; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; }
        .target.active { transform: scale(1.1); box-shadow: 0 0 40px currentColor; }
        #t0 { border-color: var(--c1); color: var(--c1); }
        #t1 { border-color: var(--c2); color: var(--c2); }
        #t2 { border-color: var(--c3); color: var(--c3); }

        #hud { position: absolute; top: 30px; text-align: center; }
        .msg { font-size: 1.5rem; letter-spacing: 4px; color: #fffb00; }
        
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(3,5,8,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .btn { background: transparent; border: 3px solid var(--c1); color: var(--c1); padding: 15px 40px; font-size: 1.5rem; cursor: pointer; font-family: 'Orbitron'; }
    </style>
</head>
<body>
    <div id="hud"><div id="status" class="msg">CYBER SIMON</div></div>
    <div id="game-board">
        <div id="t0" class="target">E</div>
        <div id="t1" class="target">R</div>
        <div id="t2" class="target">T</div>
    </div>

    <div id="start-overlay" class="overlay">
        <button class="btn" onclick="startGame()">LANCER LA SÉQUENCE</button>
        <button class="btn" style="margin-top:14px; border-color:#ff9900; color:#ff9900;" onclick="window.location.href='./index.html'">MENU</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let sequence = [], playerIdx = 0, gameState = 'IDLE';
        const targets = [document.getElementById('t0'), document.getElementById('t1'), document.getElementById('t2')];
        const freqs = [329.63, 440.00, 523.25];

        function playTone(lane) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freqs[lane], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            
            targets[lane].classList.add('active');
            setTimeout(() => targets[lane].classList.remove('active'), 400);
        }

        async function playSequence() {
            gameState = 'PLAYING_SEQ';
            document.getElementById('status').innerText = "MÉMORISEZ...";
            for (let lane of sequence) {
                await new Promise(r => setTimeout(r, 800));
                playTone(lane);
            }
            gameState = 'INPUT';
            document.getElementById('status').innerText = "À VOUS DE JOUER";
            playerIdx = 0;
        }

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            sequence = [];
            nextRound();
        }

        function nextRound() {
            sequence.push(Math.floor(Math.random() * 3));
            playSequence();
        }

        window.addEventListener('keydown', (e) => {
            if (gameState !== 'INPUT') return;
            let lane = -1;
            if (e.key.toLowerCase() === 'e') lane = 0;
            if (e.key.toLowerCase() === 'r') lane = 1;
            if (e.key.toLowerCase() === 't') lane = 2;
            
            if (lane !== -1) {
                if (lane === sequence[playerIdx]) {
                    playTone(lane);
                    playerIdx++;
                    if (playerIdx === sequence.length) {
                        document.getElementById('status').innerText = "SUCCÈS !";
                        setTimeout(nextRound, 1000);
                    }
                } else {
                    document.getElementById('status').innerText = "DÉFAITE !";
                    setTimeout(() => window.location.href = './index.html', 2000);
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Arducible Kiosk — Menu Principal</title>
    <meta name="theme-color" content="#030508">
    <link rel="icon" href="./img/Arducible.png" type="image/png">
    <link rel="apple-touch-icon" href="./img/Arducible.png">
    <link rel="manifest" href="./manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --void-bg: #030508;
            --grid-color: rgba(255, 255, 255, 0.05);
            --theme-main: #00f0ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background: #000000;
            width: 100vw; height: 100vh;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Contrainte 16:9 — bandes noires si l'écran déborde */
        .kiosk-viewport {
            position: relative;
            width:  min(100vw, calc(100vh * 16 / 9));
            height: min(100vh, calc(100vw * 9  / 16));
            background-color: var(--void-bg);
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            padding: 28px 40px;
        }

        .retro-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px; pointer-events: none; z-index: 0;
        }

        /* ── HEADER ── */
        .kiosk-header {
            display: flex; align-items: center; gap: 18px;
            position: relative; z-index: 10;
        }
        .kiosk-logo {
            width: 58px; height: 58px; object-fit: contain;
            opacity: 0.9; filter: drop-shadow(0 0 10px rgba(0,240,255,0.4));
        }
        .kiosk-titles { display: flex; flex-direction: column; }
        .kiosk-title {
            font-size: 2.2rem; font-weight: 900; letter-spacing: 6px;
            color: transparent; -webkit-text-stroke: 2px var(--theme-main);
            text-shadow: 0 0 20px var(--theme-main), 0 0 50px rgba(0,240,255,0.2);
            text-transform: uppercase; line-height: 1;
        }
        .kiosk-subtitle {
            font-size: 0.75rem; letter-spacing: 5px;
            color: rgba(255,255,255,0.3); text-transform: uppercase; margin-top: 5px;
        }

        /* ── GAMES GRID ── */
        .games-grid {
            display: flex; flex-wrap: wrap; gap: 28px;
            justify-content: center; align-items: center;
            position: relative; z-index: 10;
            flex: 1; padding: 8px 0;
        }

        .game-card {
            width: 255px;
            border: 2px solid rgba(255,255,255,0.07);
            border-radius: 12px; padding: 16px;
            background: rgba(0,0,0,0.45);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            transition: border-color 0.35s ease, box-shadow 0.35s ease,
                        transform 0.35s ease, background 0.35s ease;
            cursor: pointer;
        }

        .game-card.active {
            border-color: var(--card-color);
            box-shadow:
                0 0 28px var(--card-color),
                0 0 60px var(--card-glow-a),
                inset 0 0 18px var(--card-glow-b);
            transform: scale(1.05);
            background: var(--card-bg);
            animation: neonPulse 2s ease-in-out infinite;
        }

        .game-card.unavailable {
            opacity: 0.28; pointer-events: none; cursor: default;
        }

        .game-thumbnail {
            width: 100%; height: 126px;
            border-radius: 8px; overflow: hidden;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .game-thumbnail svg { width: 100%; height: 100%; display: block; }

        .game-info { width: 100%; text-align: center; }
        .game-title {
            font-size: 0.9rem; font-weight: 900; letter-spacing: 3px;
            text-transform: uppercase; color: rgba(255,255,255,0.55);
            transition: color 0.35s ease, text-shadow 0.35s ease;
            line-height: 1.35;
        }
        .game-card.active .game-title {
            color: var(--card-color);
            text-shadow: 0 0 12px var(--card-color);
        }
        .game-subtitle {
            font-size: 0.6rem; letter-spacing: 2px;
            color: rgba(255,255,255,0.22); text-transform: uppercase; margin-top: 5px;
        }
        .coming-soon-badge {
            display: inline-block; margin-top: 6px;
            font-size: 0.55rem; letter-spacing: 3px; color: #ff9900;
            border: 1px solid #ff9900; padding: 2px 8px;
            border-radius: 20px; text-transform: uppercase;
        }

        /* ── FOOTER ── */
        .kiosk-controls {
            display: flex; gap: 36px; align-items: center;
            position: relative; z-index: 10;
        }
        .control-hint {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.8rem; color: rgba(255,255,255,0.3);
        }
        .control-key {
            border: 2px solid var(--theme-main); color: var(--theme-main);
            padding: 3px 10px; border-radius: 4px; font-weight: 900;
            font-size: 0.85rem; text-shadow: 0 0 8px var(--theme-main);
            box-shadow: 0 0 8px rgba(0,240,255,0.25);
            font-family: 'Orbitron', sans-serif;
        }
        .control-sep { color: rgba(255,255,255,0.08); font-size: 1.4rem; }

        /* ── PORTRAIT OVERLAY ── */
        #portrait-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--void-bg); z-index: 9999;
            flex-direction: column; align-items: center;
            justify-content: center; text-align: center; gap: 20px;
        }
        @media (orientation: portrait) { #portrait-overlay { display: flex; } }
        .rotate-icon {
            font-size: 5rem; color: var(--theme-main);
            text-shadow: 0 0 30px var(--theme-main);
            animation: rotateDevice 1.5s ease-in-out infinite;
        }

        /* ── ANIMATIONS ── */
        @keyframes neonPulse {
            0%, 100% {
                box-shadow: 0 0 28px var(--card-color), 0 0 55px var(--card-glow-a), inset 0 0 18px var(--card-glow-b);
            }
            50% {
                box-shadow: 0 0 45px var(--card-color), 0 0 90px var(--card-glow-c), inset 0 0 28px var(--card-glow-a);
            }
        }
        @keyframes rotateDevice {
            0%   { transform: rotate(0deg); }
            50%  { transform: rotate(90deg); }
            100% { transform: rotate(90deg); }
        }
    </style>
</head>
<body>

    <div id="portrait-overlay">

        <p style="font-size:1.8rem;font-weight:900;color:var(--theme-main);text-shadow:0 0 15px var(--theme-main);letter-spacing:4px;text-transform:uppercase;">Tournez votre appareil</p>

            title: 'Turbo Néon',

    // ── Helpers ──────────────────────────────────────────────────────────────
    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    // ── State ─────────────────────────────────────────────────────────────────
    let currentIndex = GAMES.findIndex(g => g.available);
    if (currentIndex === -1) currentIndex = 0;

    // ── Build DOM ─────────────────────────────────────────────────────────────
    function buildMenu() {
        const grid = document.getElementById('games-grid');
        grid.innerHTML = '';
        GAMES.forEach((game, i) => {
            const card = document.createElement('div');
            card.className = 'game-card' +
                (!game.available ? ' unavailable' : '') +
                (i === currentIndex ? ' active' : '');
            card.style.setProperty('--card-color', game.color);
            card.style.setProperty('--card-glow-a', hexToRgba(game.color, 0.28));
            card.style.setProperty('--card-glow-b', hexToRgba(game.color, 0.08));
            card.style.setProperty('--card-glow-c', hexToRgba(game.color, 0.40));
            card.style.setProperty('--card-bg',     hexToRgba(game.color, 0.05));
            card.innerHTML = `
                <div class="game-thumbnail">${game.thumbnail}</div>
                <div class="game-info">
                    <div class="game-title">${game.title}</div>
                    <div class="game-subtitle">${game.subtitle}</div>
                    ${!game.available ? '<div class="coming-soon-badge">Bientôt</div>' : ''}
                </div>`;
            if (game.available) card.addEventListener('click', () => launchGame(i));
            grid.appendChild(card);
        });
    }

    function setActive(index) {
        currentIndex = index;
        document.querySelectorAll('.game-card').forEach((card, i) => {
            card.classList.toggle('active', i === currentIndex);
        });
        const activeCard = document.querySelector('.game-card.active');
        if (activeCard) activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    function navigate(direction) {
        const available = GAMES.reduce((acc, g, i) => { if (g.available) acc.push(i); return acc; }, []);
        if (available.length <= 1) return;
        const pos = available.indexOf(currentIndex);
        const nextPos = (pos + direction + available.length) % available.length;
        setActive(available[nextPos]);
    }

    function launchGame(index) {
        const game = GAMES[index];
        if (!game || !game.available) return;
        window.location.href = game.file;
    }

    // ── Keyboard (Arduino E / R / T) ─────────────────────────────────────────
    window.addEventListener('keydown', (e) => {
        if (e.repeat) return;
        const key = e.key.toLowerCase();
        if (key === 'e') navigate(-1);
        else if (key === 'r') navigate(1);
        else if (key === 't') launchGame(currentIndex);
    });

    buildMenu();

    // ── PWA ───────────────────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }

    function lockOrientation() {
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape-primary').catch(() => {});
        }
    }
    window.addEventListener('load', lockOrientation);
    window.addEventListener('orientationchange', lockOrientation);
    </script>
</body>
</html>
